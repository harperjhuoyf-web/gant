<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Modern Gantt System｜現代甘特圖系統</title>
<style>
:root{--bg:#f7f8fb;--panel:#fff;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--red:#ef4444;--green:#10b981;--yellow:#f59e0b;--purple:#8b5cf6;--pink:#ec4899;--cyan:#06b6d4;--shadow:0 16px 40px rgba(15,23,42,.08);--radius:18px;--dayw:46px;--rowh:54px;--leftw:610px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Roboto,Arial,sans-serif}.app{max-width:1440px;margin:0 auto;padding:24px}.hero{display:flex;gap:16px;align-items:flex-start;justify-content:space-between;margin-bottom:18px}.title h1{font-size:28px;margin:0 0 6px}.title p{margin:0;color:var(--muted)}.actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}button,.btn,input,select,textarea{border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);padding:10px 12px;font:inherit}button,.btn{cursor:pointer;transition:.15s;box-shadow:0 1px 0 rgba(0,0,0,.03)}button:hover,.btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(15,23,42,.08)}button.primary{background:var(--blue);color:#fff;border-color:var(--blue)}button.danger{color:#b91c1c;background:#fff5f5;border-color:#fecaca}.toolbar{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);display:grid;grid-template-columns:1.3fr repeat(5,minmax(130px,1fr));gap:10px;margin-bottom:16px}.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}.metric{font-size:24px;font-weight:800}.metric small{font-size:12px;color:var(--muted);font-weight:500}.system{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.gantt-wrap{overflow:auto;max-height:70vh;position:relative}.gantt{display:grid;grid-template-columns:var(--leftw) max-content;min-width:1120px}.left-header,.timeline-header{position:sticky;top:0;z-index:5;background:#fbfcff;border-bottom:1px solid var(--line)}.left-header{left:0;z-index:8}.left-grid{position:sticky;left:0;z-index:4;background:#fff;border-right:1px solid var(--line)}.row,.left-header{display:grid;grid-template-columns:34px 190px 80px 90px 82px 72px 62px;align-items:center;min-height:var(--rowh);border-bottom:1px solid var(--line)}.left-header{min-height:102px;font-weight:700;color:#374151}.cell{padding:8px 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.timeline-header{height:102px;display:grid;grid-template-rows:32px 30px 40px}.months,.weeks,.days,.bars-row{display:grid;grid-auto-flow:column;grid-auto-columns:var(--dayw)}.month{border-right:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:900;color:#1f2937;background:#eef4ff}.week{border-right:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#4b5563;background:#f8fafc}.day{border-right:1px solid var(--line);display:flex;flex-direction:column;line-height:1.15;align-items:center;justify-content:center;font-size:12px;color:#6b7280}.day b{font-size:14px;color:#374151}.day small{font-size:10px;color:#9ca3af}.day.weekend{background:#f3f4f6}.day.today{background:#fef3c7;color:#92400e;font-weight:900}.bars{position:relative}.bars-row{height:var(--rowh);border-bottom:1px solid var(--line);position:relative}.bars-row .slot{border-right:1px solid #f1f5f9}.bars-row .slot.weekend{background:#fafafa}.bars-row .slot.today{background:#fff7d6}.bar{position:absolute;height:28px;top:13px;border-radius:999px;color:#fff;font-weight:700;display:flex;align-items:center;gap:6px;padding:0 10px;box-shadow:0 6px 14px rgba(15,23,42,.14);overflow:hidden;white-space:nowrap}.bar .fill{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.28);border-radius:999px 0 0 999px}.bar span{position:relative;z-index:1}.milestone{position:absolute;top:15px;width:24px;height:24px;transform:rotate(45deg);border-radius:5px;box-shadow:0 6px 14px rgba(15,23,42,.16)}.mile-label{position:absolute;top:8px;font-size:12px;font-weight:800;white-space:nowrap;transform:translateX(24px)}.today-line{position:absolute;top:0;bottom:0;width:2px;background:#d97706;z-index:3;box-shadow:0 0 0 3px rgba(245,158,11,.15)}.badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:700}.status-未開始{background:#f3f4f6;color:#4b5563}.status-進行中{background:#dbeafe;color:#1d4ed8}.status-已完成{background:#d1fae5;color:#047857}.status-延遲{background:#fee2e2;color:#b91c1c}.priority-高{background:#fee2e2;color:#b91c1c}.priority-中{background:#fef3c7;color:#92400e}.priority-低{background:#e0f2fe;color:#0369a1}.avatar{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:#eef2ff;color:#3730a3;font-weight:900}.panel{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin-top:16px}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.form-grid .full{grid-column:1/-1}.hint{color:var(--muted);font-size:12px;margin-top:8px}.progress{height:8px;border-radius:999px;background:#e5e7eb;overflow:hidden}.progress>i{display:block;height:100%;background:var(--green)}.dependency{font-size:12px;color:#6b7280}.dep-warn{color:#b91c1c;font-weight:700}.legend{display:flex;gap:8px;flex-wrap:wrap}.legend span{display:inline-flex;align-items:center;gap:6px}.dot{width:10px;height:10px;border-radius:50%}.modal{position:fixed;inset:0;background:rgba(15,23,42,.4);display:none;align-items:center;justify-content:center;padding:20px;z-index:20}.modal.show{display:flex}.modal-box{background:#fff;max-width:720px;width:100%;border-radius:20px;padding:20px;box-shadow:0 30px 80px rgba(0,0,0,.25)}textarea{width:100%;min-height:220px}.empty{padding:40px;text-align:center;color:var(--muted)}@media (max-width:900px){.toolbar,.summary,.panel{grid-template-columns:1fr}.hero{display:block}.actions{justify-content:flex-start;margin-top:12px}.app{padding:14px}:root{--leftw:560px;--dayw:30px}}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="title"><h1>Modern Gantt System</h1><p>任務、時間軸、里程碑、依賴關係、狀態追蹤與今日線整合在同一個 HTML 工具中。</p></div>
    <div class="actions">
      <button class="primary" onclick="addSample()">載入範例</button>
      <button onclick="openJson()">匯入 / 匯出 JSON</button>
      <button onclick="downloadJson()">下載資料</button>
      <button onclick="window.print()">列印 / 存 PDF</button>
      <button class="danger" onclick="resetAll()">清空</button>
    </div>
  </div>
  <div class="toolbar">
    <input id="search" placeholder="搜尋任務、負責人、備註..." oninput="render()">
    <select id="statusFilter" onchange="render()"><option value="全部">全部狀態</option><option>未開始</option><option>進行中</option><option>已完成</option><option>延遲</option></select>
    <select id="ownerFilter" onchange="render()"><option value="全部">全部負責人</option></select>
    <select id="priorityFilter" onchange="render()"><option value="全部">全部優先度</option><option>高</option><option>中</option><option>低</option></select>
    <select id="viewMode" onchange="render()"><option value="day">日視圖｜清楚日期</option><option value="week">週視圖｜概覽</option></select>
    <button onclick="scrollToday()">跳到今天</button>
  </div>
  <div class="summary" id="summary"></div>
  <div class="system"><div class="gantt-wrap" id="wrap"><div class="gantt" id="gantt"></div></div></div>
  <div class="panel">
    <div class="card"><h2>新增 / 編輯任務</h2><div class="form-grid">
      <input id="taskName" placeholder="任務名稱，例如：UI 設計">
      <input id="owner" placeholder="負責人，例如：Amy">
      <input id="start" type="date">
      <input id="end" type="date">
      <select id="status"><option>未開始</option><option>進行中</option><option>已完成</option><option>延遲</option></select>
      <select id="priority"><option>高</option><option>中</option><option>低</option></select>
      <input id="progress" type="number" min="0" max="100" placeholder="進度 %">
      <select id="type"><option>一般任務</option><option>里程碑</option></select>
      <select id="depends" class="full"><option value="">無前置任務</option></select>
      <textarea id="note" class="full" placeholder="備註、交付物、風險..." style="min-height:80px"></textarea>
      <button class="primary full" onclick="saveTask()">新增任務</button>
    </div><p class="hint">提示：點任務列可快速載入表單修改；依賴關係若前置任務結束日晚於本任務開始日，會顯示衝突提醒。</p></div>
    <div class="card"><h2>設計重點</h2><p>此版本參考現代甘特圖工具常見做法：多視圖概念、任務負責人、進度、里程碑、依賴關係、今日線、狀態篩選與可匯出資料。</p><div class="legend" id="legend"></div><hr><h3>依賴關係提醒</h3><div id="dependencyList"></div></div>
  </div>
</div>
<div class="modal" id="jsonModal"><div class="modal-box"><h2>匯入 / 匯出 JSON</h2><textarea id="jsonText"></textarea><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px"><button onclick="closeJson()">取消</button><button class="primary" onclick="importJson()">套用 JSON</button></div></div></div>
<script>
const colors={高:'#ef4444',中:'#f59e0b',低:'#06b6d4'};let editingId=null;let tasks=JSON.parse(localStorage.getItem('modernGanttTasks')||'null')||[
{id:1,name:'需求訪談與範圍確認',owner:'PM',start:'2026-07-01',end:'2026-07-05',status:'已完成',priority:'高',progress:100,type:'一般任務',depends:'',note:'確認專案目標、限制、利害關係人'},
{id:2,name:'IA / User Flow',owner:'UX',start:'2026-07-04',end:'2026-07-10',status:'進行中',priority:'高',progress:55,type:'一般任務',depends:1,note:'完成資訊架構與主要流程'},
{id:3,name:'設計系統建立',owner:'UI',start:'2026-07-08',end:'2026-07-16',status:'進行中',priority:'中',progress:35,type:'一般任務',depends:2,note:'按鈕、表單、卡片、色彩、字級'},
{id:4,name:'MVP 介面完成',owner:'UI',start:'2026-07-17',end:'2026-07-17',status:'未開始',priority:'高',progress:0,type:'里程碑',depends:3,note:'第一版設計可交付'},
{id:5,name:'前端開發',owner:'FE',start:'2026-07-18',end:'2026-07-31',status:'未開始',priority:'高',progress:0,type:'一般任務',depends:4,note:'串接主要頁面與互動'},
{id:6,name:'測試與修正',owner:'QA',start:'2026-07-28',end:'2026-08-06',status:'未開始',priority:'中',progress:0,type:'一般任務',depends:5,note:'功能測試、UI 檢查、回歸測試'},
{id:7,name:'正式上線',owner:'PM',start:'2026-08-08',end:'2026-08-08',status:'未開始',priority:'高',progress:0,type:'里程碑',depends:6,note:'上線檢查與發佈'}];
function d(s){let [y,m,day]=s.split('-').map(Number);return new Date(y,m-1,day)}function fmt(dt){return dt.toISOString().slice(0,10)}function daysBetween(a,b){return Math.round((d(b)-d(a))/86400000)}function addDays(dt,n){let x=new Date(dt);x.setDate(x.getDate()+n);return x}function save(){localStorage.setItem('modernGanttTasks',JSON.stringify(tasks))}
function getFiltered(){let q=document.getElementById('search').value.toLowerCase(),sf=statusFilter.value,of=ownerFilter.value,pf=priorityFilter.value;return tasks.filter(t=>(sf==='全部'||t.status===sf)&&(of==='全部'||t.owner===of)&&(pf==='全部'||t.priority===pf)&&[t.name,t.owner,t.note,t.status,t.priority].join(' ').toLowerCase().includes(q))}
function render(){save();populateFilters();let filtered=getFiltered();let gantt=document.getElementById('gantt');if(!tasks.length){gantt.innerHTML='<div class="empty">目前沒有任務，請新增或載入範例。</div>';return}let all=filtered.length?filtered:tasks;let min=new Date(Math.min(...all.map(t=>d(t.start))));let max=new Date(Math.max(...all.map(t=>d(t.end))));min=addDays(min,-2);max=addDays(max,3);let total=daysBetween(fmt(min),fmt(max))+1;let dayW=(viewMode.value==='week')?26:46;document.documentElement.style.setProperty('--dayw',dayW+'px');let today=new Date();let todayIdx=Math.round((new Date(today.getFullYear(),today.getMonth(),today.getDate())-min)/86400000);let left='<div class="left-header"><div></div><div class="cell">任務</div><div class="cell">負責人</div><div class="cell">狀態</div><div class="cell">優先度</div><div class="cell">進度</div><div class="cell">操作</div></div><div class="left-grid">';
filtered.forEach(t=>{left+=`<div class="row" onclick="editTask(${t.id})"><div class="cell">${t.type==='里程碑'?'◆':'—'}</div><div class="cell" title="${t.note||''}"><b>${t.name}</b><div class="dependency">${depText(t)}</div></div><div class="cell"><span class="avatar">${(t.owner||'?').slice(0,1)}</span> ${t.owner}</div><div class="cell"><span class="badge status-${t.status}">${t.status}</span></div><div class="cell"><span class="badge priority-${t.priority}">${t.priority}</span></div><div class="cell"><div>${t.progress||0}%</div><div class="progress"><i style="width:${t.progress||0}%"></i></div></div><div class="cell"><button onclick="event.stopPropagation();delTask(${t.id})">刪除</button></div></div>`});left+='</div>';
let months='',weeks='',days='';let curMonth='',monthSpan=0,curWeek='',weekSpan=0;const weekdays=['日','一','二','三','四','五','六'];function weekLabel(dt){let first=new Date(dt.getFullYear(),0,1);let n=Math.ceil((((dt-first)/86400000)+first.getDay()+1)/7);return 'W'+String(n).padStart(2,'0')}for(let i=0;i<total;i++){let dt=addDays(min,i),m=`${dt.getFullYear()} 年 ${String(dt.getMonth()+1).padStart(2,'0')} 月`,w=weekLabel(dt);if(i===0){curMonth=m;monthSpan=1;curWeek=w;weekSpan=1}else{if(m===curMonth){monthSpan++}else{months+=`<div class="month" style="grid-column:span ${monthSpan}">${curMonth}</div>`;curMonth=m;monthSpan=1}if(w===curWeek){weekSpan++}else{weeks+=`<div class="week" style="grid-column:span ${weekSpan}">${curWeek}</div>`;curWeek=w;weekSpan=1}}let wk=[0,6].includes(dt.getDay())?' weekend':'';let ist=i===todayIdx?' today':'';days+=`<div class="day${wk}${ist}"><b>${dt.getDate()}</b><small>${weekdays[dt.getDay()]}</small></div>`}months+=`<div class="month" style="grid-column:span ${monthSpan}">${curMonth}</div>`;weeks+=`<div class="week" style="grid-column:span ${weekSpan}">${curWeek}</div>`;
let right=`<div class="timeline-header"><div class="months">${months}</div><div class="weeks">${weeks}</div><div class="days">${days}</div></div><div class="bars" style="width:${total*dayW}px">`;if(todayIdx>=0&&todayIdx<total)right+=`<div class="today-line" style="left:${todayIdx*dayW+dayW/2}px"></div>`;filtered.forEach(t=>{let slots='';for(let i=0;i<total;i++){let dt=addDays(min,i),wk=[0,6].includes(dt.getDay())?' weekend':'',ist=i===todayIdx?' today':'';slots+=`<div class="slot${wk}${ist}"></div>`}let startIdx=daysBetween(fmt(min),t.start),dur=Math.max(1,daysBetween(t.start,t.end)+1);right+=`<div class="bars-row">${slots}`;if(t.type==='里程碑'){right+=`<div class="milestone" title="${t.name}｜${t.start}" style="left:${startIdx*dayW+(dayW-24)/2}px;background:${colors[t.priority]}"></div><div class="mile-label" style="left:${startIdx*dayW+dayW/2}px;color:${colors[t.priority]}">${t.name}</div>`}else{right+=`<div class="bar" title="${t.name}｜${t.start} - ${t.end}" style="left:${startIdx*dayW+3}px;width:${dur*dayW-6}px;background:${colors[t.priority]}"><i class="fill" style="width:${t.progress||0}%"></i><span>${t.name}</span></div>`}right+='</div>'});right+='</div>';gantt.innerHTML=left+right;renderSummary(filtered);renderDeps();renderLegend();populateDepends();}
function depText(t){if(!t.depends)return '無前置任務';let p=tasks.find(x=>String(x.id)===String(t.depends));if(!p)return '前置任務不存在';return `依賴：${p.name}`}
function hasConflict(t){if(!t.depends)return false;let p=tasks.find(x=>String(x.id)===String(t.depends));return p&&d(p.end)>d(t.start)}
function renderDeps(){let div=dependencyList;let conflicts=tasks.filter(hasConflict);if(!conflicts.length){div.innerHTML='<p class="hint">目前沒有依賴衝突。</p>';return}div.innerHTML=conflicts.map(t=>`<p class="dep-warn">⚠ ${t.name}：前置任務尚未結束就開始。</p>`).join('')}
function renderSummary(list){let done=tasks.filter(t=>t.status==='已完成').length,late=tasks.filter(t=>t.status==='延遲').length,avg=Math.round(tasks.reduce((s,t)=>s+(+t.progress||0),0)/(tasks.length||1));summary.innerHTML=`<div class="card"><div class="metric">${tasks.length}<small> 項</small></div><div>任務總數</div></div><div class="card"><div class="metric">${avg}%</div><div>平均進度</div></div><div class="card"><div class="metric">${done}</div><div>已完成</div></div><div class="card"><div class="metric">${late}</div><div>延遲任務</div></div><div class="card"><div class="metric">${tasks.filter(t=>t.type==='里程碑').length}</div><div>里程碑</div></div>`}
function renderLegend(){legend.innerHTML=Object.entries(colors).map(([k,v])=>`<span><i class="dot" style="background:${v}"></i>${k}優先度</span>`).join('')}
function populateFilters(){let owners=[...new Set(tasks.map(t=>t.owner).filter(Boolean))];let cur=ownerFilter.value;ownerFilter.innerHTML='<option value="全部">全部負責人</option>'+owners.map(o=>`<option ${cur===o?'selected':''}>${o}</option>`).join('')}
function populateDepends(){let cur=depends.value;depends.innerHTML='<option value="">無前置任務</option>'+tasks.filter(t=>t.id!==editingId).map(t=>`<option value="${t.id}" ${String(cur)===String(t.id)?'selected':''}>${t.name}</option>`).join('')}
function saveTask(){let name=taskName.value.trim();if(!name||!start.value||!end.value){alert('請至少填寫任務名稱、開始日期、結束日期');return}let obj={id:editingId||Date.now(),name,owner:owner.value.trim()||'未指派',start:start.value,end:end.value,status:status.value,priority:priority.value,progress:Math.max(0,Math.min(100,+progress.value||0)),type:type.value,depends:depends.value,note:note.value};if(d(obj.end)<d(obj.start)){alert('結束日期不能早於開始日期');return}if(editingId){tasks=tasks.map(t=>t.id===editingId?obj:t);editingId=null;document.querySelector('.form-grid button.primary').textContent='新增任務'}else tasks.push(obj);clearForm();render()}
function editTask(id){let t=tasks.find(x=>x.id===id);if(!t)return;editingId=id;taskName.value=t.name;owner.value=t.owner;start.value=t.start;end.value=t.end;status.value=t.status;priority.value=t.priority;progress.value=t.progress;type.value=t.type;note.value=t.note||'';populateDepends();depends.value=t.depends||'';document.querySelector('.form-grid button.primary').textContent='儲存修改'}
function delTask(id){if(confirm('確定刪除這項任務？')){tasks=tasks.filter(t=>t.id!==id);tasks.forEach(t=>{if(String(t.depends)===String(id))t.depends=''});render()}}
function clearForm(){['taskName','owner','start','end','progress','note'].forEach(id=>document.getElementById(id).value='');depends.value='';status.value='未開始';priority.value='高';type.value='一般任務'}
function resetAll(){if(confirm('確定清空全部資料？')){tasks=[];save();render()}}
function addSample(){localStorage.removeItem('modernGanttTasks');location.reload()}
function openJson(){jsonText.value=JSON.stringify(tasks,null,2);jsonModal.classList.add('show')}function closeJson(){jsonModal.classList.remove('show')}function importJson(){try{tasks=JSON.parse(jsonText.value);closeJson();render()}catch(e){alert('JSON 格式錯誤')}}function downloadJson(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(tasks,null,2)],{type:'application/json'}));a.download='gantt-data.json';a.click()}
function scrollToday(){let wrap=document.getElementById('wrap');let idx=[...document.querySelectorAll('.day')].findIndex(el=>el.classList.contains('today'));if(idx>=0)wrap.scrollLeft=Math.max(0,610+idx*(parseInt(getComputedStyle(document.documentElement).getPropertyValue('--dayw'))||46)-300)}
render();
</script>
</body></html>
